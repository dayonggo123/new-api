version: '3.8'

services:
  new-api:
    build: .
    container_name: new-api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /www/wwwroot/new-api/data:/data
    environment:
      - SESSION_SECRET=heharse_cloud_secret_2024
      - SQL_DSN=newapi:zhangjy@233@tcp(127.0.0.1:13306)/newapi?charset=utf8mb4
      - REDIS_CONN_STRING=redis://127.0.0.1:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
